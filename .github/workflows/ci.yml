name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + dev)
        run: pip install -e '.[dev]'
      - name: Type check
        run: pyright
      - name: Test (offline suite)
        # The default suite is network-free; the live GRPO test is opt-in
        # (AMBERTRACE_RLVR_LIVE) and stays skipped here.
        run: pytest tests/ -q
