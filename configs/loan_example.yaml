# Example run config — Loan Approval verified platform.
# A concrete, working example (platform_id 9 on the reference account). Point
# platform_id at your own verified platform and set AMBERTRACE_API_KEY in .env.
domain:
  platform_id: 9
  base_url: https://app.ambertrace.ai
  query_template: "Assess this loan application: {facts}"
  parser: json_block
  parser_args:
    answer_key: classification
    facts_key: facts

reward:
  shaper: default
  weights: { format: 0.1, certified: 0.5, correctness: 1.0, graded: 0.3, rejected_penalty: 0.2 }
  clip: [-1.0, 2.0]

verifier:
  batch_size: 32
  max_concurrency: 16
  cache: true

training:
  framework: trl_grpo
  model: Qwen/Qwen2.5-1.5B
  group_size: 8
  learning_rate: 1.0e-6

dataset:
  path: data/loan_train.jsonl        # {prompt, gold?} records
eval:
  path: data/loan_eval.jsonl
